name: Publish to PyPI

# Builds the package and publishes it to PyPI when a GitHub Release is
# published. Authentication uses PyPI Trusted Publishing (OIDC) — no API
# tokens or secrets required. The `pypi` environment and this file's name
# (workflow.yml) must match the Trusted Publisher configured on PyPI.

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/geolint/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
